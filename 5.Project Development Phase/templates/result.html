{% extends 'base.html' %}
{% block content %}
<div class="card result-shell">
  <div class="card-body p-4 p-md-5">
    <p class="section-kicker mb-2">Model Output</p>
    <h4 class="mb-3">Prediction Result for {{name}}</h4>
    <div class="result-stats">
      <p><strong>Decision:</strong> {{prediction}}</p>
      <p><strong>Probability:</strong> {{probability}}</p>
    </div>
    <div class="mt-4">
      <h5>How to get better offers</h5>
      <ul>
        {% for tip in suggestions %}
          <li>{{ tip }}</li>
        {% endfor %}
      </ul>
    </div>
    <a class="btn btn-primary" href="/predict">Make another prediction</a>
  </div>
</div>
{% endblock %}
